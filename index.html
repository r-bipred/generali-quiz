<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC&C Next Level Mindset Quiz</title>
    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary-color: #c1210d; 
            --primary-hover: #9a1b0b; 
            
            --bg-color: #ffffff;
            --card-bg: #ffffff;
            --text-color: #333;
            --dark-text: #20252b;
            
            /* COLORI OPZIONI */
            --opt-bg-normal: #ffffff;
            --opt-border-normal: #c1210d;
            --opt-text-normal: #c1210d;
            --letter-bg-normal: #c1210d;
            --letter-text-normal: #ffffff;
            
            --opt-bg-selected: #c1210d; 
            --opt-border-selected: #c1210d;
            --opt-text-selected: #ffffff;
            --letter-bg-selected: #ffffff;
            --letter-text-selected: #c1210d;
            
            /* PROGRESS BAR COLORS */
            --progress-bg: #DADADA; 
            --progress-fill: #c1210d; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            // align-items: center;
            // min-height: 100vh;
        }

        .quiz-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 700px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        p.subtitle {
            color: var(--dark-text);
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 18px;
        }

        /* --- PROGRESS BAR --- */
        .progress-container {
            width: 100%;
            height: 3px;
            background-color: var(--progress-bg); 
            margin-bottom: 30px; 
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--progress-fill); 
            width: 0%; 
            transition: width 0.4s ease-out; 
        }

        /* --- STILE INTESTAZIONE DOMANDA --- */
        .question-header {
            display: flex;
            align-items: flex-start; 
            margin-bottom: 25px;
            gap: 15px;
        }

        .question-number-box {
            background-color: var(--primary-color);
            color: white;
            font-weight: normal; 
            font-size: 14px; 
            padding: 6px;
            line-height: 18px;
            border-radius: 8px 0px;
            flex-shrink: 0; 
            min-width: 18px;
            text-align: center;
        }

        #question-text {
            font-size: 24px;
            color: var(--primary-color);
            line-height: 1.3;
            margin: 0; 
            font-weight: 700;
        }

        /* --- STILE IMMAGINI GENERALI --- */
        .image-area {
            width: 100%;
            height: 250px; 
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Default: allineato a sinistra (Intro e Domande) */
            margin-bottom: 30px;
            overflow: hidden;
        }

        .image-area img {
            object-fit: contain;
            object-position: left; 
            max-width: 100%;
            height: 100%;
        }

        /* Stile specifico per centrare l'immagine nella schermata dei risultati */
        #result-screen .image-area {
            justify-content: center;
        }
        #result-screen .image-area img {
            object-position: center;
        }


        /* --- STILE OPZIONI --- */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: var(--opt-bg-normal);
            border: 1px solid var(--opt-border-normal);
            color: var(--opt-text-normal);
            font-weight: normal; 
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            display: flex;
            align-items: center;
        }

        .option-letter {
            font-weight: normal; 
            font-size: 14px;
            margin-right: 15px;
            background-color: var(--letter-bg-normal);
            color: var(--letter-text-normal);
            padding: 6px; 
            min-width: 14px; 
            line-height: 1; 
            text-align: center;
        }

        .option-btn.selected {
            background-color: var(--opt-bg-selected);
            color: var(--opt-text-selected);
            border: 1px solid var(--opt-border-selected);
        }

        .option-btn.selected .option-letter {
            background-color: var(--letter-bg-selected);
            color: var(--letter-text-selected);
        }

        /* --- BOTTONE AZIONE --- */
        .action-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            float: left;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background-color: var(--primary-hover);
        }
        
        .action-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* --- SCHEDA FINALE --- */
        .result-section {
            text-align: center;
            display: none; 
        }

        .result-title {
            font-size: 36px;
            color: var(--primary-color); 
            margin-bottom: 20px;
            font-weight: 700;
        }

        .result-desc {
            font-size: 18px;
            line-height: 1.6;
            text-align: left;
            margin-bottom: 15px;
            color: var(--dark-text);
        }
        
        .result-footer {
            font-size: 18px;
            line-height: 1.6;
            text-align: left;
            margin-top: 15px;
            color: var(--dark-text);
        }

        .result-section .action-btn {
            float: none;
        }

        .hidden { display: none !important; }
        .clearfix::after { content: ""; clear: both; display: table; }

        @media (max-width: 600px) {
            .quiz-container { padding: 20px; }
            h1 { font-size: 26px; }
            #question-text { font-size: 20px; }
            .action-btn { width: 100%; float: none; }
            .image-area { height: 200px; } /* Ridotta leggermente l'altezza su mobile */
        }
    </style>
</head>
<body>

<div class="quiz-container">
    
    <div id="intro-screen">
        <h1>Which GC&C Conviction Represents You?</h1>
        <p class="subtitle">
            Take the quiz to see which conviction speaks to you most — and remember that every conviction is essential for bringing GC&C towards the Next Level.
        </p>
        <div class="image-area">
            <img src="Generali_Quiz-start.png" alt="Intro Image">
        </div>
        <button class="action-btn clearfix" onclick="startQuiz()">Start Quiz</button>
    </div>

    <div id="question-screen" class="hidden">
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="question-header">
            <div class="question-number-box" id="q-number">1</div>
            <h3 id="question-text">Question text...</h3>
        </div>
        
        <div class="image-area">
            <img id="question-image" src="" alt="Question Image">
        </div>

        <div class="options-container" id="options-list"></div>

        <button id="next-btn" class="action-btn clearfix" onclick="nextQuestion()" disabled>OK</button>
        <div class="clearfix"></div>
    </div>

    <div id="result-screen" class="hidden result-section">
        <div class="image-area">
            <img id="result-image" src="" alt="Result Image">
        </div>
        <h2 class="result-title" id="result-header">Your Result</h2>
        <div id="result-content"></div>
        <button class="action-btn" onclick="location.reload()">Retake Quiz</button>
    </div>

</div>

<script>
    const questions = [
        {
            text: "When you face a new and complex challenge, your first instinct is to:",
            options: [
                { type: "A", text: "Ask questions, explore different perspectives, and learn from others" },
                { type: "B", text: "Challenge existing approaches and propose a bold or alternative solution" },
                { type: "C", text: "Define a clear plan and focus on delivering results efficiently" }
            ]
        },
        {
            text: "You receive feedback that questions your current way of working. You:",
            options: [
                { type: "A", text: "See it as a learning opportunity and reflect on how to improve" },
                { type: "B", text: "Use it to rethink assumptions and push for a different approach" },
                { type: "C", text: "Translate it into concrete actions to improve execution and outcomes" }
            ]
        },
        {
            text: "In a team discussion, you usually contribute by:",
            options: [
                { type: "A", text: "Bringing insights, asking “why” and “what if”" },
                { type: "B", text: "Encouraging the team to step out of their comfort zone" },
                { type: "C", text: "Driving alignment and keeping the team focused on delivery" }
            ]
        },
        {
            text: "When change is introduced, you:",
            options: [
                { type: "A", text: "Try to understand the reasons behind it and what you can learn" },
                { type: "B", text: "Embrace it as an opportunity to innovate and challenge the status quo" },
                { type: "C", text: "Focus on how to make it work effectively and sustainably" }
            ]
        },
        {
            text: "What motivates you the most?",
            options: [
                { type: "A", text: "Continuous learning and personal growth" },
                { type: "B", text: "Making an impact by doing things differently and better" },
                { type: "C", text: "Turning ambition into tangible, high-quality results" }
            ]
        },
        {
            text: "Excellence, for you, means:",
            options: [
                { type: "A", text: "Never stop learning and improving" },
                { type: "B", text: "Having the courage to try, fail, and try again" },
                { type: "C", text: "Delivering consistently with discipline and responsibility" }
            ]
        },
        {
            text: "When you have an idea to improve something, you usually:",
            options: [
                { type: "A", text: "Research, ask for input, and test different options before deciding" },
                { type: "B", text: "Pitch it boldly, challenge current ways of working, and push for change" },
                { type: "C", text: "Turn it into a concrete action plan and drive it through to completion" }
            ]
        }
    ];

    const resultsData = {
        A: {
            title: "🔍 Mostly A – The Curious Explorer",
            desc: "<strong>Curiosity is your driving force.</strong> You embody the belief that discovery leads to better decisions, continuous learning, and shared growth. You naturally ask questions, seek understanding, and help others see new possibilities.<br><br><strong>Your strength:</strong> generating knowledge and fostering improvement.<br><strong>Your Next Level:</strong> pair your curiosity with decisive action to turn insights into impact."
        },
        B: {
            title: "🔥 Mostly B – The Courageous Challenger",
            desc: "<strong>You thrive on courage and change.</strong> You question what’s familiar, push boundaries, and are not afraid to challenge the status quo. You bring energy, innovation, and bold thinking into the organization.<br><br><strong>Your strength:</strong> driving transformation and innovation.<br><strong>Your Next Level:</strong> balance bold ideas with structure and execution to maximize impact."
        },
        C: {
            title: "🎯 Mostly C – The Committed Achiever",
            desc: "<strong>Commitment defines you.</strong> You turn ambition into reality through discipline, ownership, and flawless execution. You are reliable, resilient, and focused on delivering value to clients and colleagues.<br><br><strong>Your strength:</strong> making things happen, consistently and responsibly.<br><strong>Your Next Level:</strong> keep nurturing curiosity and courage to fuel continuous evolution."
        }
    };

    let currentQuestionIndex = 0;
    let scores = { A: 0, B: 0, C: 0 };
    let selectedOption = null;

    function startQuiz() {
        document.getElementById('intro-screen').classList.add('hidden');
        document.getElementById('question-screen').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        const qData = questions[currentQuestionIndex];
        document.getElementById('question-text').innerText = qData.text;
        const qNum = currentQuestionIndex + 1;
        document.getElementById('q-number').innerText = qNum;
        
        // --- LOGICA PROGRESS BAR ---
        const totalQuestions = questions.length;
        const progressPercentage = (qNum / totalQuestions) * 100;
        document.getElementById('progress-bar').style.width = progressPercentage + '%';

        // --- LOGICA IMMAGINE DOMANDA ---
        // Aggiunge uno zero iniziale se il numero è minore di 10 (es. 01, 02)
        const paddedNum = String(qNum).padStart(2, '0');
        const imgName = `Generali_Quiz-${paddedNum}.png`;
        document.getElementById('question-image').src = imgName;

        selectedOption = null;
        document.getElementById('next-btn').disabled = true;
        
        const optionsList = document.getElementById('options-list');
        optionsList.innerHTML = ''; 

        qData.options.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = `<span class="option-letter">${opt.type}</span> <span>${opt.text}</span>`;
            btn.onclick = () => selectOption(opt.type, btn);
            optionsList.appendChild(btn);
        });
    }

    function selectOption(type, btnElement) {
        selectedOption = type;
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btnElement.classList.add('selected');
        document.getElementById('next-btn').disabled = false;
    }

    function nextQuestion() {
        if (!selectedOption) return;
        scores[selectedOption]++;
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            renderQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('question-screen').classList.add('hidden');
        const resultScreen = document.getElementById('result-screen');
        resultScreen.classList.remove('hidden');
        resultScreen.style.display = 'block';

        let winner = 'A';
        if (scores.B > scores.A && scores.B > scores.C) winner = 'B';
        if (scores.C > scores.A && scores.C > scores.B) winner = 'C';
        
        const result = resultsData[winner];
        
        // --- LOGICA IMMAGINE RISULTATO ---
        const resultImages = {
            A: "Generali_Quiz-explorer.png",
            B: "Generali_Quiz-challenger.png",
            C: "Generali_Quiz-achiever.png"
        };
        document.getElementById('result-image').src = resultImages[winner];

        
        const commonFooter = `
            <hr style="border: 0; border-top: 1px solid #c1210d; margin: 25px 0;">
            <p class="result-footer">
                <strong>No matter your result:</strong> Everyone, every day, we drive excellence for every client.<br><br>
                The GC&C Next Level Mindset is about combining <strong>Curiosity, Courage, and Commitment</strong> and growing together.
            </p>
        `;

        document.getElementById('result-header').innerText = result.title;
        document.getElementById('result-content').innerHTML = 
            `<p class="result-desc">${result.desc}</p>` + commonFooter;
    }
</script>

</body>
</html>
